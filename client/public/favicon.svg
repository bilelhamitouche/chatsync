<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140">
  <defs>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="bubbleGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1D4ED8" flood-opacity="0.25"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1D4ED8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main large bubble -->
  <rect x="8" y="14" width="72" height="52" rx="14" fill="url(#bubbleGrad)" filter="url(#shadow)"/>
  <polygon points="18,66 10,84 36,66" fill="#1D4ED8"/>

  <!-- Secondary smaller bubble -->
  <rect x="38" y="50" width="56" height="40" rx="11" fill="url(#bubbleGrad2)" filter="url(#shadow2)"/>
  <polygon points="82,90 92,106 66,90" fill="#2563EB"/>

  <!-- Sync arrows on main bubble -->
  <path d="M28,32 A14,14 0 0 1 56,32" stroke="white" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <polygon points="56,26 56,38 63,32" fill="white"/>
  <path d="M56,52 A14,14 0 0 1 28,52" stroke="rgba(255,255,255,0.75)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <polygon points="28,46 28,58 21,52" fill="rgba(255,255,255,0.75)"/>

  <!-- Dots on secondary bubble -->
  <circle cx="55" cy="70" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="66" cy="70" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="77" cy="70" r="3.5" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="118" y="78"
    font-family="'Trebuchet MS', 'Gill Sans', Calibri, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#1E3A8A">Chat</text>
  <text x="238" y="78"
    font-family="'Trebuchet MS', 'Gill Sans', Calibri, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#2563EB">Sync</text>

  <!-- Tagline -->
  <text x="119" y="102"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="12.5"
    letter-spacing="4"
    fill="#6B9FD4"
    font-weight="500">STAY IN SYNC</text>
</svg>
